<style>
        body {
            background-color: #000000;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }
        .glass-card {
            background: rgba(13, 13, 13, 0.8);
            backdrop-filter: blur(20px);

        }
        .neon-glow {
            box-shadow: 0 0 20px rgba(205, 242, 0, 0.15);
        }
        .neon-glow-active:active {

        }

        }

            border-color: #cdf200 !important;

<body class="font-body-lg text-body-lg selection:bg-primary-fixed/30 selection:text-primary-fixed">
<!-- Top Navigation Suppression (Transactional Page) -->
<main class="min-h-screen flex flex-col items-center justify-center px-container-margin py-stack-lg relative overflow-hidden">
<!-- Atmospheric Background Element -->
<div class="absolute top-[-10%] right-[-10%] w-[300px] h-[300px] bg-primary-fixed/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[250px] h-[250px] bg-secondary-container/5 rounded-full blur-[100px]"></div>
<!-- Authentication Container -->
<div class="w-full max-w-[400px] flex flex-col space-y-stack-lg z-10">
<!-- Logo Section -->
<div class="flex flex-col items-center text-center space-y-stack-md">
<div class="w-16 h-16 flex items-center justify-center bg-primary-fixed rounded-xl neon-glow">
<span class="material-symbols-outlined text-on-primary-fixed text-[40px]" style="font-variation-settings: 'FILL' 1;">monitoring</span>
</div>
<div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary-fixed tracking-tight">FinData Pro</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant/70 mt-base">Welcome Back</p>
</div>
</div>
<!-- Social Login -->
<div class="space-y-stack-md">
<button class="w-full h-14 flex items-center justify-center space-x-stack-md glass-card rounded-xl hover:bg-surface-variant/10 transition-all border-surface-variant/30">
<svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-body-lg text-body-lg text-on-surface font-title-md">Sign up with Google</span>
</button>
<div class="flex items-center space-x-stack-md divider-text text-on-surface-variant/40 font-label-caps text-[10px] tracking-widest">
<span>OR SIGN IN WITH</span>
</div>
</div>
<!-- Login Form -->
<form class="space-y-stack-md" onsubmit="event.preventDefault();">
<div class="space-y-base">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-base">Email address</label>
<input class="w-full h-14 px-gutter bg-surface-container-lowest border border-surface-variant/30 rounded-xl font-body-lg text-on-surface placeholder:text-on-surface-variant/30 transition-all font-label-caps" placeholder="tanya.hill@example.com" type="email">
</div>
<div class="space-y-base">
<div class="flex justify-between items-center px-base">
<label class="font-label-caps text-label-caps text-on-surface-variant">Password</label>
</div>
<div class="relative">
<input class="w-full h-14 px-gutter pr-12 bg-surface-container-lowest border border-surface-variant/30 rounded-xl font-body-lg text-on-surface placeholder:text-on-surface-variant/30 transition-all font-label-caps" placeholder="••••••••" type="password">
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 hover:text-primary-fixed transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<div class="flex justify-end pt-base">
<a class="font-label-caps text-label-caps text-primary-fixed/80 hover:text-primary-fixed transition-colors" href="#">Forget password?</a>
</div>
</div>
<!-- Custom Checkbox -->
<div class="flex items-center space-x-stack-sm pt-base px-base">
<label class="relative flex items-center cursor-pointer">
<input class="peer hidden" type="checkbox">
<div class="w-5 h-5 border border-surface-variant/50 rounded flex items-center justify-center bg-surface-container-low peer-checked:bg-primary-fixed peer-checked:border-primary-fixed transition-all">
<span class="material-symbols-outlined text-on-primary-fixed text-[16px] hidden peer-checked:block" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="ml-stack-sm font-body-sm text-body-sm text-on-surface-variant/70">Keep me <span class="text-primary-fixed">Login</span></span>
</label>
</div>
<!-- Primary Action -->
<button class="w-full h-14 bg-primary-fixed text-on-primary-fixed font-title-md text-title-md rounded-xl neon-glow neon-glow-active transition-all mt-stack-lg flex items-center justify-center" type="submit">
                    Login
                </button>
</form>
<!-- Footer Link -->
<div class="pt-stack-md text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant/60">
                    Don't have an Account? 
                    <a class="text-primary-fixed font-semibold hover:underline decoration-primary-fixed/30 underline-offset-4" href="#">Sign Up</a>
</p>
</div>
</div>
<!-- Secondary Decorative Element -->
<div class="mt-stack-lg w-full max-w-[400px] opacity-20">
<div class="grid grid-cols-4 gap-base h-1">
<div class="bg-primary-fixed rounded-full"></div>
<div class="bg-surface-variant rounded-full"></div>
<div class="bg-surface-variant rounded-full"></div>
<div class="bg-surface-variant rounded-full"></div>
</div>
</div>
</main>
<!-- Bottom Navigation Suppression (Transactional Page) -->
<script>
        // Micro-interactions for form fields
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.closest('.space-y-base').querySelector('label').classList.replace('text-on-surface-variant', 'text-primary-fixed');
            });
            input.addEventListener('blur', () => {
                input.parentElement.closest('.space-y-base').querySelector('label').classList.replace('text-primary-fixed', 'text-on-surface-variant');
            });
        });

        // Simple Toggle for Visibility
        const visibilityBtn = document.querySelector('button .material-symbols-outlined');
        if (visibilityBtn) {
            visibilityBtn.parentElement.addEventListener('click', () => {
                const input = visibilityBtn.parentElement.previousElementSibling;
                if (input.type === 'password') {
                    input.type = 'text';
                    visibilityBtn.textContent = 'visibility';
                } else {
                    input.type = 'password';
                    visibilityBtn.textContent = 'visibility_off';
                }
            });
        }
    </script>
</body></html>
